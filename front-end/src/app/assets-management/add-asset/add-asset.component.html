<div
  class="add-asset-backdrop modal-backdrop animate-fade-in"
  (click)="onBackdropClick($event)"
>
  <div
    class="add-asset-card animate-slide-up"
    (click)="$event.stopPropagation()"
  >
    <header class="add-asset-header">
      <h2 class="add-asset-title">Add Asset</h2>
      <p class="add-asset-legend">
        Required <span class="add-asset-legend__star">*</span>
      </p>
    </header>

    <div class="add-asset-body">
      <form class="add-asset-form" (ngSubmit)="onSubmit()" #assetForm="ngForm">
        <!-- Classification -->
        <section class="add-asset-section">
          <h3 class="add-asset-section__title">
            <span class="add-asset-dot add-asset-dot--blue" aria-hidden="true"></span>
            Classification
          </h3>
          <div class="add-asset-grid add-asset-grid--2">
            <div class="add-asset-field">
              <label class="add-asset-label" for="category">
                Category <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="category"
                  class="add-asset-input"
                  [(ngModel)]="generalData.categoryId"
                  name="category"
                  (change)="onCategoryChange()"
                  required
                  title="Select asset category"
                >
                  <option [ngValue]="null" disabled>Select Category</option>
                  <option *ngFor="let cat of categories" [ngValue]="cat.id">
                    {{ cat.name }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="LayoutGrid" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="type">
                Type <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="type"
                  class="add-asset-input"
                  [(ngModel)]="generalData.typeId"
                  name="type"
                  [disabled]="!generalData.categoryId"
                  required
                  title="Select asset type"
                >
                  <option [ngValue]="null" disabled>Select Type</option>
                  <option *ngFor="let type of availableTypes" [ngValue]="type.id">
                    {{ type.name }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="SlidersHorizontal" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="manufacturer">
                Manufacturer <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="manufacturer"
                  class="add-asset-input"
                  [(ngModel)]="generalData.manufacturerId"
                  name="manufacturer"
                  (change)="onManufacturerChange()"
                  required
                  title="Select manufacturer"
                >
                  <option [ngValue]="null" disabled>Select Manufacturer</option>
                  <option *ngFor="let mfr of manufacturers" [ngValue]="mfr.id">
                    {{ mfr.name }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="Briefcase" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="model">
                Model <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="model"
                  class="add-asset-input"
                  [(ngModel)]="generalData.modelId"
                  name="model"
                  [disabled]="!generalData.manufacturerId"
                  required
                  title="Select model"
                >
                  <option [ngValue]="null" disabled>Select Model</option>
                  <option *ngFor="let mdl of availableModels" [ngValue]="mdl.id">
                    {{ mdl.name }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="Layers" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>
          </div>
        </section>

        <!-- Basic Info -->
        <section class="add-asset-section">
          <h3 class="add-asset-section__title">
            <span class="add-asset-dot add-asset-dot--green" aria-hidden="true"></span>
            Basic Info
          </h3>
          <div class="add-asset-grid add-asset-grid--3">
            <div class="add-asset-field">
              <label class="add-asset-label" for="assetName">
                Asset Name <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <input
                  id="assetName"
                  type="text"
                  class="add-asset-input"
                  [(ngModel)]="specificData.name"
                  name="name"
                  placeholder="e.g., Dell Latitude 7420"
                  required
                  title="Enter asset name"
                />
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="FileText" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="serialNumber">
                Serial Number <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <input
                  id="serialNumber"
                  type="text"
                  class="add-asset-input"
                  [(ngModel)]="specificData.serialNumber"
                  name="serialNumber"
                  placeholder="e.g., SN-DELL-001"
                  required
                  title="Enter serial number"
                />
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="Hash" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="status">
                Status <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="status"
                  class="add-asset-input"
                  [(ngModel)]="generalData.status"
                  name="status"
                  required
                  title="Select asset status"
                >
                  <option *ngFor="let status of statusOptions" [value]="status">
                    {{ status }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="Flag" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field add-asset-field--full">
              <label class="add-asset-label" for="notes">Notes</label>
              <textarea
                id="notes"
                class="add-asset-input add-asset-input--textarea"
                [(ngModel)]="specificData.notes"
                name="notes"
                placeholder="Add any additional notes..."
                rows="3"
                title="Enter notes"
              ></textarea>
            </div>
          </div>
        </section>

        <!-- Category-specific -->
        <section *ngIf="getSpecificFields().length > 0" class="add-asset-section">
          <h3 class="add-asset-section__title">
            <span class="add-asset-dot add-asset-dot--teal" aria-hidden="true"></span>
            {{ currentCategory }} Specifications
          </h3>
          <div class="add-asset-grid add-asset-grid--3">
            <ng-container *ngFor="let field of getSpecificFields()">
              <div *ngIf="getFieldType(field) !== 'checkbox'" class="add-asset-field">
                <label class="add-asset-label" [attr.for]="field">
                  {{ getFieldLabel(field) }}
                </label>
                <input
                  [id]="field"
                  [type]="getFieldType(field)"
                  class="add-asset-input"
                  style="padding-right: 0.875rem"
                  [(ngModel)]="specificData.categorySpecificData[field]"
                  [name]="field"
                  [placeholder]="getFieldLabel(field)"
                  [title]="getFieldLabel(field)"
                />
              </div>
              <div
                *ngIf="getFieldType(field) === 'checkbox'"
                class="add-asset-field add-asset-checkbox-row"
              >
                <input
                  type="checkbox"
                  class="add-asset-checkbox"
                  [(ngModel)]="specificData.categorySpecificData[field]"
                  [name]="field"
                  [id]="field"
                  [title]="getFieldLabel(field)"
                />
                <label class="add-asset-label" [attr.for]="field">
                  {{ getFieldLabel(field) }}
                </label>
              </div>
            </ng-container>
          </div>
        </section>

        <!-- Location -->
        <section class="add-asset-section">
          <h3 class="add-asset-section__title">
            <span class="add-asset-dot add-asset-dot--purple" aria-hidden="true"></span>
            Location
          </h3>
          <div class="add-asset-grid add-asset-grid--4">
            <div class="add-asset-field">
              <label class="add-asset-label" for="branch">
                Branch <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="branch"
                  class="add-asset-input"
                  [(ngModel)]="generalData.branchId"
                  name="branch"
                  (change)="onBranchChange()"
                  required
                  title="Select branch"
                >
                  <option [ngValue]="null" disabled>Select Branch</option>
                  <option *ngFor="let branch of branches" [ngValue]="branch.id">
                    {{ branch.name }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="MapPin" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="building">
                Building <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="building"
                  class="add-asset-input"
                  [(ngModel)]="generalData.buildingId"
                  name="building"
                  (change)="onBuildingChange()"
                  [disabled]="!generalData.branchId"
                  required
                  title="Select building"
                >
                  <option [ngValue]="null" disabled>Select Building</option>
                  <option *ngFor="let building of buildings" [ngValue]="building.id">
                    {{ building.name }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="Building2" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="floor">
                Floor <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="floor"
                  class="add-asset-input"
                  [(ngModel)]="generalData.floorId"
                  name="floor"
                  (change)="onFloorChange()"
                  [disabled]="!generalData.buildingId"
                  required
                  title="Select floor"
                >
                  <option [ngValue]="null" disabled>Select Floor</option>
                  <option *ngFor="let floor of floors" [ngValue]="floor.id">
                    {{ floor.name }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="Armchair" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="room">
                Room <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <select
                  id="room"
                  class="add-asset-input"
                  [(ngModel)]="generalData.roomId"
                  name="room"
                  [disabled]="!generalData.floorId"
                  required
                  title="Select room"
                >
                  <option [ngValue]="null" disabled>Select Room</option>
                  <option *ngFor="let room of rooms" [ngValue]="room.id">
                    {{ room.name }}
                  </option>
                </select>
                <span class="add-asset-select-chevron" aria-hidden="true">
                  <lucide-angular [img]="ChevronDown" [strokeWidth]="2" />
                </span>
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="DoorOpen" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>
          </div>
        </section>

        <!-- Finance & Warranty -->
        <section class="add-asset-section">
          <h3 class="add-asset-section__title">
            <span class="add-asset-dot add-asset-dot--orange" aria-hidden="true"></span>
            Finance &amp; Warranty
          </h3>
          <div class="add-asset-grid add-asset-grid--3">
            <div class="add-asset-field">
              <label class="add-asset-label" for="purchaseDate">
                Purchase Date <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <input
                  id="purchaseDate"
                  type="date"
                  class="add-asset-input"
                  [(ngModel)]="generalData.purchaseDate"
                  name="purchaseDate"
                  required
                  title="Select purchase date"
                />
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="Calendar" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="warrantyExpiry">
                Warranty Expiry <span class="add-asset-required">*</span>
              </label>
              <div class="add-asset-input-wrap">
                <input
                  id="warrantyExpiry"
                  type="date"
                  class="add-asset-input"
                  [(ngModel)]="generalData.warrantyExpiry"
                  name="warrantyExpiry"
                  required
                  title="Select warranty expiry date"
                />
                <span class="add-asset-input-icon" aria-hidden="true">
                  <lucide-angular [img]="Calendar" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>

            <div class="add-asset-field">
              <label class="add-asset-label" for="responsibleUserId">Responsible User</label>
              <div class="add-asset-input-wrap">
                <input
                  id="responsibleUserId"
                  type="number"
                  class="add-asset-input add-asset-input--icon-left"
                  [(ngModel)]="generalData.responsibleUserId"
                  name="responsibleUserId"
                  placeholder="Enter User ID"
                  title="Enter responsible user ID"
                />
                <span class="add-asset-input-icon add-asset-input-icon--left" aria-hidden="true">
                  <lucide-angular [img]="User" [strokeWidth]="1.75" />
                </span>
              </div>
            </div>
          </div>
        </section>
      </form>
    </div>

    <footer class="add-asset-footer">
      <button type="button" class="add-asset-btn-cancel" (click)="onClose()">
        Cancel
      </button>
      <button
        type="submit"
        class="add-asset-btn-submit"
        (click)="onSubmit()"
        [disabled]="isLoading"
      >
        <span *ngIf="!isLoading">Create Asset</span>
        <span *ngIf="isLoading" class="add-asset-btn-spinner" aria-hidden="true"></span>
        <span *ngIf="isLoading">Creating...</span>
      </button>
    </footer>
  </div>
</div>
