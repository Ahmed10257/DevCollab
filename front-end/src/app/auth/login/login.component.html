<div class="auth-form">
  <h2 class="auth-form__title">Welcome Back 👋</h2>

  @if (error()) {
    <p class="auth-form__error" role="alert">{{ error() }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form__fields">
    <div class="auth-field">
      <label class="auth-field__label" for="login-username">Username or email</label>
      <input
        id="login-username"
        type="text"
        formControlName="username"
        class="auth-field__input"
        placeholder="ahmed.mabrouk or you@aast.edu"
        autocomplete="username"
      />
    </div>

    <div class="auth-field">
      <label class="auth-field__label" for="login-password">Password</label>
      <input
        id="login-password"
        type="password"
        formControlName="password"
        class="auth-field__input"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>

    <button
      type="submit"
      class="auth-form__submit"
      [disabled]="loading()"
    >
      {{ loading() ? 'Signing in…' : 'Login' }}
    </button>

    <!-- <p class="auth-form__link-row">
      <a href="#" class="auth-form__link" (click)="$event.preventDefault()">
        Forgot Password?
      </a>
    </p>

    <p class="auth-form__footer">
      Don't have an account?
      <button type="button" class="auth-form__link-btn" (click)="navigateToRegister.emit()">
        Sign Up
      </button>
    </p> -->
  </form>
</div>
