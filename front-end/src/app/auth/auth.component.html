<button
  type="button"
  class="auth-theme-toggle"
  [class.auth-theme-toggle--register]="isRegister()"
  (click)="toggleTheme()"
  [attr.aria-label]="theme.mode() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
>
  <span class="auth-theme-toggle__icon-wrap" aria-hidden="true">
    <lucide-angular
      [img]="theme.mode() === 'dark' ? Sun : Moon"
      class="auth-theme-toggle__icon"
      [strokeWidth]="1.75"
    />
  </span>
</button>

<div class="auth-layout">
  <section class="auth-slot auth-slot--left" aria-label="Login form">
    <app-login
      class="auth-form-panel"
      [class.auth-form-panel--visible]="showLoginForm()"
      (navigateToRegister)="goToRegister()"
    />
  </section>

  <aside
    class="auth-brand"
    [class.auth-brand--left]="isRegister()"
    aria-label="DevCollab branding"
  >
    <app-auth-branding-panel />
  </aside>

  <section class="auth-slot auth-slot--right" aria-label="Registration form">
    <app-register
      class="auth-form-panel"
      [class.auth-form-panel--visible]="showRegisterForm()"
      (navigateToLogin)="goToLogin()"
    />
  </section>
</div>
