<div class="auth-form">
  <h2 class="auth-form__title">Create Account 🚀</h2>

  @if (error()) {
    <p class="auth-form__error" role="alert">{{ error() }}</p>
  }

  @if (passwordsMismatch()) {
    <p class="auth-form__error" role="alert">Passwords do not match.</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form__fields">
    <div class="auth-field">
      <label class="auth-field__label" for="register-name">Name</label>
      <input
        id="register-name"
        type="text"
        formControlName="name"
        class="auth-field__input"
        placeholder="Your full name"
        autocomplete="name"
      />
    </div>

    <div class="auth-field">
      <label class="auth-field__label" for="register-email">Email</label>
      <input
        id="register-email"
        type="email"
        formControlName="email"
        class="auth-field__input"
        placeholder="you@example.com"
        autocomplete="email"
      />
    </div>

    <div class="auth-field">
      <label class="auth-field__label" for="register-password">Password</label>
      <input
        id="register-password"
        type="password"
        formControlName="password"
        class="auth-field__input"
        placeholder="••••••••"
        autocomplete="new-password"
      />
    </div>

    <div class="auth-field">
      <label class="auth-field__label" for="register-confirm">Confirm Password</label>
      <input
        id="register-confirm"
        type="password"
        formControlName="confirmPassword"
        class="auth-field__input"
        placeholder="••••••••"
        autocomplete="new-password"
      />
    </div>

    <button
      type="submit"
      class="auth-form__submit"
      [disabled]="loading()"
    >
      {{ loading() ? 'Creating account…' : 'Sign Up' }}
    </button>

    <p class="auth-form__footer">
      Already have an account?
      <button type="button" class="auth-form__link-btn" (click)="navigateToLogin.emit()">
        Login
      </button>
    </p>
  </form>
</div>
